<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>任务管理系统 | Task Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon.ico">
  <meta name="theme-color" content="#3B82F6">
  <meta name="description" content="基于 Electron + Vue3 + TailwindCSS + Pinia 的任务管理系统">
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',
            success: '#10B981',
            warning: '#F59E0B',
            danger: '#EF4444',
            darkBg: '#0F172A',
            darkCard: '#1E293B',
            lightBg: '#F8FAFC',
            lightCard: '#FFFFFF',
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-in-out',
            'slide-up': 'slideUp 0.3s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(10px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
          },
        },
      }
    }
  </script>
</head>
<body class="bg-lightBg dark:bg-darkBg text-slate-800 dark:text-slate-200 min-h-screen transition-all-300">
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
